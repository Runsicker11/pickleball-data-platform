name: pickleball_data_platform
version: "1.0.0"
config-version: 2

profile: pickleball_data_platform

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  pickleball_data_platform:
    staging:
      amazon_ads:
        +schema: stg_amazon
        +materialized: view
      shopify:
        +schema: stg_shopify
        +materialized: view
      meta:
        +schema: stg_meta
        +materialized: view
      google_ads:
        +schema: stg_google_ads
        +materialized: view
      search_console:
        +schema: stg_search_console
        +materialized: view
    intermediate:
      +materialized: view
      amazon_ads:
        +schema: int_amazon
      marketing:
        +schema: int_marketing
    marts:
      +schema: bi
      +materialized: table
    compat:
      +schema: marketing_data
      +materialized: view
