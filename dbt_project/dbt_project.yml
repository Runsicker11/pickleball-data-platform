name: pickleball_data_platform
version: "1.0.0"
config-version: 2

profile: pickleball_data_platform

model-paths: ["models"]
test-paths: ["tests"]
macro-paths: ["macros"]
target-path: "target"
clean-targets: ["target", "dbt_packages"]

models:
  pickleball_data_platform:
    staging:
      amazon_ads:
        +schema: stg_amazon
        +materialized: view
      shopify:
        +schema: stg_shopify
        +materialized: view
      meta:
        +schema: stg_meta
        +materialized: view
      google_ads:
        +schema: stg_google_ads
        +materialized: view
      search_console:
        +schema: stg_search_console
        +materialized: view
      quickbooks:
        +schema: stg_quickbooks
        +materialized: view
      paypal:
        +schema: stg_paypal
        +materialized: view
      google_trends:
        +schema: stg_google_trends
        +materialized: view
      merchant_center:
        +schema: stg_merchant_center
        +materialized: view
      klaviyo:
        +schema: stg_klaviyo
        +materialized: view
      youtube:
        +schema: stg_youtube
        +materialized: view
    intermediate:
      +materialized: view
      amazon_ads:
        +schema: int_amazon
      marketing:
        +schema: int_marketing
      finance:
        +schema: int_finance
    marts:
      +schema: bi
      +materialized: table
    compat:
      +schema: marketing_data
      +materialized: view

seeds:
  pickleball_data_platform:
    +schema: raw_bank
    paypal_partner_mapping:
      +schema: raw_paypal
    paypal_txn_names:
      +schema: raw_paypal
    bank_statement_revenue:
      +column_types:
        month: date
        revenue: float64
        transaction_count: int64
    bank_statement_expenses:
      +column_types:
        month: date
        is_owner_compensation: boolean
        total_amount: float64
        transaction_count: int64
    bank_statement_affiliate:
      +column_types:
        month: date
        revenue: float64
        transaction_count: int64
