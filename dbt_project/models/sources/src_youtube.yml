version: 2

sources:
  - name: raw_youtube
    database: practical-gecko-373320
    schema: raw_youtube
    description: "Raw YouTube Data API v3 + Analytics API data loaded by dlt"
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 72, period: hour}
    loaded_at_field: ingested_at
    tables:
      - name: channel_stats
        description: "Daily snapshot of channel-level metrics (subscribers, views, video count)"
        columns:
          - name: channel_id
            tests: [not_null]
          - name: snapshot_date
            tests: [not_null]

      - name: videos
        description: "Video catalog — one row per video_id, updated each run with latest metadata"
        columns:
          - name: video_id
            tests: [not_null, unique]
          - name: title
            tests: [not_null]

      - name: video_stats
        description: "Daily snapshot of per-video engagement counts (views, likes, comments)"
        columns:
          - name: video_id
            tests: [not_null]
          - name: snapshot_date
            tests: [not_null]

      - name: video_analytics
        description: "Per-video daily analytics from YouTube Analytics API (impressions, watch time, CTR)"
        columns:
          - name: video_id
            tests: [not_null]
          - name: report_date
            tests: [not_null]
