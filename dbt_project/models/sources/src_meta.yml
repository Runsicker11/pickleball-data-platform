version: 2

sources:
  - name: raw_meta
    database: practical-gecko-373320
    schema: raw_meta
    description: "Raw Meta Ads data loaded by dlt (campaigns, adsets, ads, creatives, daily insights)"
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: ingested_at
    tables:
      - name: campaigns
        description: "Meta Ads campaigns"
        columns:
          - name: campaign_id
            tests: [not_null]

      - name: adsets
        description: "Meta Ads ad sets"
        columns:
          - name: adset_id
            tests: [not_null]

      - name: ads
        description: "Meta Ads individual ads"
        columns:
          - name: ad_id
            tests: [not_null]

      - name: creatives
        description: "Meta Ads creative assets and copy"
        columns:
          - name: creative_id
            tests: [not_null]

      - name: daily_insights
        description: "Meta Ads daily performance metrics per ad"
        columns:
          - name: date_start
            tests: [not_null]
          - name: ad_id
            tests: [not_null]
