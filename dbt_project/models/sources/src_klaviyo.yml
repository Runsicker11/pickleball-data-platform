version: 2

sources:
  - name: raw_klaviyo
    database: practical-gecko-373320
    schema: raw_klaviyo
    description: "Raw Klaviyo email marketing data loaded by dlt"
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: ingested_at
    tables:
      - name: campaigns
        description: "Klaviyo email campaigns"
        columns:
          - name: id
            tests: [not_null]

      - name: campaign_metrics
        description: "Aggregate send metrics per Klaviyo campaign (recipients, opens, clicks, revenue)"
        columns:
          - name: campaign_id
            tests: [not_null]

      - name: flows
        description: "Klaviyo automation flows"
        columns:
          - name: id
            tests: [not_null]

      - name: flow_messages
        description: "Individual messages within Klaviyo flows"
        columns:
          - name: id
            tests: [not_null]

      - name: metrics_timeline
        description: "Daily aggregate email metrics (Opened Email, Clicked Email, Placed Order)"
        columns:
          - name: date
            tests: [not_null]
          - name: metric_name
            tests: [not_null]
