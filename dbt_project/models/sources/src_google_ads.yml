version: 2

sources:
  - name: raw_google_ads
    database: practical-gecko-373320
    schema: raw_google_ads
    description: "Raw Google Ads data loaded by dlt (campaigns, ad groups, keywords, daily insights, search terms)"
    freshness:
      warn_after: {count: 36, period: hour}
      error_after: {count: 48, period: hour}
    loaded_at_field: ingested_at
    tables:
      - name: campaigns
        description: "Google Ads campaigns"
        columns:
          - name: campaign_id
            tests: [not_null]

      - name: ad_groups
        description: "Google Ads ad groups"
        columns:
          - name: ad_group_id
            tests: [not_null]

      - name: keywords
        description: "Google Ads keyword criteria"
        columns:
          - name: keyword_id
            tests: [not_null]

      - name: daily_insights
        description: "Google Ads daily performance metrics per campaign"
        columns:
          - name: date_start
            tests: [not_null]
          - name: campaign_id
            tests: [not_null]

      - name: search_terms
        description: "Google Ads search term report (actual queries triggering ads)"
        columns:
          - name: date_start
            tests: [not_null]
          - name: search_term
            tests: [not_null]

      - name: bidding_strategy
        description: "Google Ads bidding strategies with tCPA and tROAS targets"
        columns:
          - name: bidding_strategy_id
            tests: [not_null]

      - name: conversion_action
        description: "Google Ads conversion actions and tracking configuration"
        columns:
          - name: conversion_action_id
            tests: [not_null]

      - name: shopping_performance
        description: "Google Ads shopping performance by product (last 90 days, daily)"
        columns:
          - name: date_start
            tests: [not_null]
          - name: campaign_id
            tests: [not_null]
          - name: product_item_id
            tests: [not_null]

      - name: asset_group
        description: "Google Ads PMAX asset groups"
        columns:
          - name: asset_group_id
            tests: [not_null]

      - name: asset_group_asset
        description: "Google Ads PMAX asset group assets (headlines, descriptions, images, shopping feed)"
        columns:
          - name: asset_resource_name
            tests: [not_null]

      - name: campaign_asset_set
        description: "Google Ads campaign asset set linkages — confirms shopping feed attached to PMAX"
        columns:
          - name: campaign_id
            tests: [not_null]

      - name: geographic_view
        description: "Google Ads geographic performance by country (last 90 days, daily)"
        columns:
          - name: date_start
            tests: [not_null]
          - name: campaign_id
            tests: [not_null]

      - name: campaign_audience_view
        description: "Google Ads campaign audience performance for observational audiences"
        columns:
          - name: resource_name
            tests: [not_null]

      - name: auction_insights
        description: "Google Ads auction insights — competitor impression share and overlap metrics (last 90 days, daily)"
        columns:
          - name: date_start
            tests: [not_null]
          - name: campaign_id
            tests: [not_null]
          - name: domain
            tests: [not_null]
