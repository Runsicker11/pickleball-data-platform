version: 2

models:
  - name: fct_amazon__daily_profitability
    description: >
      Daily profitability by ASIN — joins orders, ad spend, and product COGS.
      Calculates contribution = sales - (COGS + FBA + ad cost + selling fees + refunds + shipping).
    columns:
      - name: purchase_date_utc
        tests: [not_null]
      - name: asin
        tests: [not_null]
      - name: sales
        tests: [not_null]
      - name: contribution
        description: "Net contribution after all costs"

  - name: fct_marketing__channel_summary
    description: "Materialized channel summary for dashboard KPIs"
    columns:
      - name: report_date
        tests: [not_null]
      - name: channel
        tests: [not_null]

  - name: fct_marketing__enhanced_roas
    description: "Materialized GA4-attributed ROAS by channel for trends"
    columns:
      - name: report_date
        tests: [not_null]
      - name: channel
        tests: [not_null]

  - name: fct_marketing__product_profitability
    description: "Materialized SKU-level profitability for P&L"

  - name: fct_marketing__trends
    description: "Materialized rolling averages for daily/weekly reports"
    columns:
      - name: report_date
        tests: [not_null]

  - name: fct_marketing__customer_ltv
    description: "Cohort-based Customer Lifetime Value — 6-month avg gross profit for mature customers"
    columns:
      - name: cohort_month
        tests: [not_null, unique]
      - name: cohort_size
        tests: [not_null]
      - name: avg_ltv_6mo
        description: "Average 6-month gross profit per customer in this cohort"
      - name: avg_contribution_ltv_6mo
        description: "Average 6-month contribution profit (after shipping) per customer"
      - name: total_contribution_profit_6mo
        description: "Total contribution profit across all customers in cohort"
      - name: total_shipping_cost_6mo
        description: "Total estimated shipping cost across all customers in cohort"
      - name: cohort_contribution_margin
        description: "Contribution profit as fraction of revenue for the cohort"

  - name: dim_shopify__products
    description: "Product dimension table with variant aggregations"
    columns:
      - name: product_id
        tests: [not_null, unique]

  - name: fct_finance__monthly_pnl
    description: >
      Monthly P&L — revenue by stream, total expenses, net income, net margin.
      Core table for the finance overview dashboard.
    columns:
      - name: month
        tests: [not_null]

  - name: fct_finance__monthly_revenue
    description: "Monthly revenue by stream (Wholesale, Shopify, Amazon, Affiliate, Sponsorship)"
    columns:
      - name: month
        tests: [not_null]
      - name: revenue_stream
        tests: [not_null]

  - name: fct_finance__expense_detail
    description: "Monthly expenses by category from purchase line items"
    columns:
      - name: month
        tests: [not_null]
      - name: expense_category
        tests: [not_null]

  - name: fct_finance__expense_by_vendor
    description: "Vendor spend by month with subscription detection"
    columns:
      - name: vendor_name
        tests: [not_null]
      - name: month
        tests: [not_null]

  - name: fct_finance__affiliate_by_partner
    description: "Affiliate revenue by partner by month — PayPal + bank deposits matched to partner brands"
    columns:
      - name: month
        tests: [not_null]
      - name: partner_name
        tests: [not_null]

  - name: fct_finance__expense_enriched
    description: "Monthly expenses with expense buckets and month-over-month changes"
    columns:
      - name: month
        tests: [not_null]
      - name: expense_bucket
        tests: [not_null]

  - name: fct_finance__subscription_analysis
    description: "Subscription vendor analysis with cost projections and cost-cutting signals"
    columns:
      - name: vendor_name
        tests: [not_null, unique]

  - name: mart_google_ads_search_term_ngrams
    description: >
      Weekly n-gram analysis (1- and 2-word tokens) of Google Ads search terms.
      Each row = one n-gram × campaign × ISO week. total_spend reflects spend from
      all search terms containing that n-gram — useful for spotting wasteful token
      patterns spread too thin to trigger per-term alerts. signal column classifies
      each n-gram as wasteful / watch / top_performer / good / neutral.
      Rolling 8-week history; singletons with < $5 spend excluded.
    columns:
      - name: week_start
        tests: [not_null]
        description: "Monday of the ISO week (date_trunc WEEK(MONDAY))"
      - name: ngram
        tests: [not_null]
      - name: ngram_length
        description: "1 = unigram, 2 = bigram"
      - name: campaign_name
        tests: [not_null]
      - name: signal
        description: "wasteful | watch | top_performer | good | neutral"
