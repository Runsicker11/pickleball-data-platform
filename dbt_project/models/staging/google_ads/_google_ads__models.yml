version: 2

models:
  - name: stg_google_ads__campaigns
    description: "Staged Google Ads campaigns with typed columns"
    columns:
      - name: campaign_id
        tests: [not_null]

  - name: stg_google_ads__ad_groups
    description: "Staged Google Ads ad groups with typed columns"
    columns:
      - name: ad_group_id
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_google_ads__keywords
    description: "Staged Google Ads keywords with typed columns"
    columns:
      - name: keyword_id
        tests: [not_null]
      - name: ad_group_id
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_google_ads__daily_insights
    description: "Staged Google Ads daily performance metrics"
    columns:
      - name: date_start
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_google_ads__search_terms
    description: "Staged Google Ads search term report"
    columns:
      - name: date_start
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: search_term
        tests: [not_null]

  - name: stg_google_ads__bidding_strategy
    description: "Staged Google Ads bidding strategies with tCPA/tROAS targets in dollars"
    columns:
      - name: bidding_strategy_id
        tests: [not_null]

  - name: stg_google_ads__conversion_action
    description: "Staged Google Ads conversion actions with tracking configuration"
    columns:
      - name: conversion_action_id
        tests: [not_null]

  - name: stg_google_ads__shopping_performance
    description: "Staged Google Ads shopping performance — product-level metrics (last 90 days, daily)"
    columns:
      - name: date_start
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: product_item_id
        tests: [not_null]

  - name: stg_google_ads__asset_group
    description: "Staged Google Ads PMAX asset groups"
    columns:
      - name: asset_group_id
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_google_ads__asset_group_asset
    description: "Staged Google Ads PMAX asset group assets (headlines, descriptions, images)"
    columns:
      - name: asset_resource_name
        tests: [not_null]
      - name: asset_group_id
        tests: [not_null]

  - name: stg_google_ads__campaign_asset_set
    description: "Staged Google Ads campaign asset sets — confirms shopping feed linkage to PMAX"
    columns:
      - name: campaign_id
        tests: [not_null]
      - name: asset_set_id
        tests: [not_null]

  - name: stg_google_ads__geographic_view
    description: "Staged Google Ads geographic performance (last 90 days, daily)"
    columns:
      - name: date_start
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: country_criterion_id
        tests: [not_null]

  - name: stg_google_ads__campaign_audience_view
    description: "Staged Google Ads campaign audience performance (observational audiences)"
    columns:
      - name: resource_name
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_google_ads__auction_insights
    description: "Staged Google Ads auction insights — competitor domain impression share and overlap metrics (loaded via Google Ads Scripts → Google Sheets → BigQuery)"
    columns:
      - name: date
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: competitor_domain
        tests: [not_null]

  - name: stg_google_ads__ad_schedule_view
    description: "Staged Google Ads ad schedule (dayparting) performance — hourly and day-of-week metrics for campaign schedule optimization (last 90 days, daily)"
    columns:
      - name: date_start
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
