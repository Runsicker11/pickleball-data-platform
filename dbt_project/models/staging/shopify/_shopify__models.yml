version: 2

models:
  - name: stg_shopify__orders
    description: "Staged Shopify orders with typed columns"
    columns:
      - name: order_id
        tests: [not_null]
      - name: order_number
        tests: [not_null]
      - name: order_date
        tests: [not_null]

  - name: stg_shopify__order_line_items
    description: "Staged Shopify order line items with typed columns"
    columns:
      - name: line_item_id
        tests: [not_null]
      - name: order_id
        tests: [not_null]
      - name: order_date
        tests: [not_null]

  - name: stg_shopify__products
    description: "Staged Shopify products with typed columns"
    columns:
      - name: product_id
        tests: [not_null]

  - name: stg_shopify__product_variants
    description: "Staged Shopify product variants with typed columns"
    columns:
      - name: variant_id
        tests: [not_null]
      - name: product_id
        tests: [not_null]

  - name: stg_shopify__customers
    description: "Staged Shopify customers with typed columns"
    columns:
      - name: customer_id
        tests: [not_null]

  - name: stg_shopify__sessions
    description: "Staged Shopify sessions from ShopifyQL (daily by referrer source)"
    columns:
      - name: report_date
        tests: [not_null]
      - name: referrer_source
        tests: [not_null]
      - name: sessions
        tests: [not_null]
