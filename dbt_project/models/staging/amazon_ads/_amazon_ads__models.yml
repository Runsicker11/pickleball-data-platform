version: 2

models:
  - name: stg_amazon_ads__sp_campaigns
    description: "Staged Sponsored Products campaign-level daily metrics"
    columns:
      - name: report_date
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_amazon_ads__sb_campaigns
    description: "Staged Sponsored Brands campaign-level daily metrics"
    columns:
      - name: report_date
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_amazon_ads__sd_campaigns
    description: "Staged Sponsored Display campaign-level daily metrics"
    columns:
      - name: report_date
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]

  - name: stg_amazon_ads__sp_asin
    description: "Staged Sponsored Products ASIN-level daily metrics"
    columns:
      - name: report_date
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: asin
        tests: [not_null]

  - name: stg_amazon_ads__sd_asin
    description: "Staged Sponsored Display ASIN-level daily metrics"
    columns:
      - name: report_date
        tests: [not_null]
      - name: campaign_id
        tests: [not_null]
      - name: asin
        tests: [not_null]

  - name: stg_amazon__orders_clean
    description: "Cleaned Amazon orders from SP-API (seller_orders + seller_order_items)"
    columns:
      - name: amazon_order_id
        tests: [not_null]
      - name: asin
        tests: [not_null]
      - name: purchase_date
        tests: [not_null]

  - name: stg_amazon__fba_shipments
    description: "Staged FBA fulfilled shipments (buyer info, carrier, tracking)"
    columns:
      - name: amazon_order_id
        tests: [not_null]
      - name: sku
        tests: [not_null]
      - name: shipment_id
        tests: [not_null]

  - name: stg_amazon__traffic
    description: "Staged Sales & Traffic by ASIN (sessions, page views, buy box %)"
    columns:
      - name: child_asin
        tests: [not_null]
      - name: report_date
        tests: [not_null]

  - name: stg_amazon__fba_fees
    description: "Staged FBA fee estimates per SKU (referral, pick-pack, fulfillment)"
    columns:
      - name: sku
        tests: [not_null]
      - name: asin
        tests: [not_null]
